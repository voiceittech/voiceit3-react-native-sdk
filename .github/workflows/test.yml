name: API Test
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Check JS syntax
        run: node --check src/VoiceItAPI.js
      # Real cloud smoke of the SDK's API layer against api.voiceit.io. The SDK
      # source is copied to .mjs so Node runs it as ESM. Non-media cycle
      # (create -> getAll -> delete); media enroll/verify needs an RN device.
      # Skipped for Dependabot (no org/repo secret access).
      - name: Cloud smoke (SDK API layer vs api.voiceit.io)
        if: ${{ github.actor != 'dependabot[bot]' }}
        env:
          VOICEIT_API_KEY: ${{ secrets.VOICEIT_API_KEY }}
          VOICEIT_API_TOKEN: ${{ secrets.VOICEIT_API_TOKEN }}
        run: |
          cp src/VoiceItAPI.js ci/_voiceitapi.mjs
          node ci/cloud_smoke.mjs
